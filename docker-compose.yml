name: image-sharing-poc

services:
  bff:
    build:
      context: ../image-sharing-smart-bff
      dockerfile: Dockerfile
    env_file:
      - ../image-sharing-smart-bff/.env
    environment:
      PORT: "8084"
      SMART_UI_URL: http://localhost:5173
      SMART_BFF_UI_ORIGIN: http://localhost:5173
      SMART_REDIRECT_URI: http://localhost:8084/smart/callback
      SMART_COOKIE_SAME_SITE: Lax
      SMART_COOKIE_SECURE: "false"
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8084/health"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SMART_BFF_URL: http://localhost:8084
        VITE_BASE_PATH: /
    depends_on:
      bff:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
